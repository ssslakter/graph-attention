defaults:
  - model: vit_base
  - dataset: cifar10
  - optimizer: adamw
  - scheduler: onecycle
  - _self_

run: ${now:%Y-%m-%d}/${now:%H-%M-%S}

dataloader:
  batch_size: 128
  valid_batch_size: 256
  num_workers: 6
  persistent_workers: true
  pin_memory: true

torch:
  compile: true
  matmul_precision: high

training:
  seed: 42
  epochs: 30
  use_amp: false
  amp_dtype: float16
  device: cuda
  grad_clip: 1.0
  spectral_loss_lambda: 0.0

hooks:
  checkpoint:
    enabled: true
    _target_: trainer_tools.hooks.CheckpointHook
    save_dir: ${hydra:runtime.output_dir}/checkpoints
    save_every_steps: 1000
    keep_last: 3
    resume_path: ${hydra:runtime.output_dir}/checkpoints/checkpoint_interrupted.pt
    save_strategy: best
    metric_name: valid_loss

  ema:
    enabled: true
    _target_: trainer_tools.hooks.EMAHook
    decay: 0.9999
  
  metrics:
    enabled: true
    _target_: trainer_tools.hooks.MetricsHook
    verbose: false
    tracker_type: trackio  # 'wandb', 'trackio' or null
    project: graph-attn
    name: ${run}
    metrics:
      - _target_: graph_attention.training.metrics.LayerActivationStats
        freq: 1
      - _target_: trainer_tools.hooks.metrics.Loss
      - _target_: trainer_tools.hooks.metrics.Accuracy
      - _target_: trainer_tools.hooks.metrics.LRStats

# Hydra configuration
hydra:
  run:
    dir: outputs/${run}
  sweep:
    dir: outputs/multirun/${now:%Y-%m-%d_%H-%M-%S}
    subdir: order_${model.attention_layer.order}
  job:
    chdir: false