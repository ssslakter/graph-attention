# Large model on CIFAR-100 with cosine annealing
# To run: python train.py --config-name exp_large_cifar100

defaults:
  - /model: vit_large
  - /dataset: cifar100
  - /optimizer: adamw
  - /scheduler: cosine
  - _self_

run_name: large_cifar100

training:
  epochs: 100
  grad_clip: 1.0

optimizer:
  lr: 5e-4
  weight_decay: 0.05
