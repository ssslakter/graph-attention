# @package _global_

defaults:
  - /model/layers@model.attention_layer: attention
  - override /model: vit_tiny
  - override /dataset: cifar10
  - override /optimizer: adamw
  - override /scheduler: onecycle

# Optimization Parameters
optimizer:
  lr: 1e-3
  weight_decay: 0.1    # Increased WD to combat overfitting on small data

training:
  epochs: 200          # ViTs need 300+ epochs to compete with CNNs
  use_amp: true
  grad_clip: 1.0

dataloader:
  batch_size: 512      # Larger batches stabilize ViT training
  valid_batch_size: 512
  num_workers: 6


hooks:
  ema:
    decay: 0.999       # better for 300 epochs on small data
  
  metrics:
    metrics:
      - _target_: graph_attention.training.metrics.LayerActivationStats
        freq: 1000
      - _target_: trainer_tools.hooks.metrics.Loss
      - _target_: graph_attention.training.metrics.AccuracyMixup
      - _target_: trainer_tools.hooks.metrics.LRStats
  checkpoint:
    save_every_steps: 1000
    keep_last: 1000
run: vit_tiny_cifar10/${now:%Y-%m-%d_%H-%M-%S}
