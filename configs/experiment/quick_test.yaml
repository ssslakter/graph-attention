# To run: python train.py --config-name exp_quick_test

defaults:
  - /model: vit_small
  - /dataset: cifar10
  - /optimizer: adamw
  - /scheduler: onecycle
  - _self_

run_name: quick_test

training:
  epochs: 10
  use_amp: false

dataset:
  augmentation: strong

hooks:
  checkpoint:
    save_every_steps: 200
