# @package _global_
# Example experiment config that overrides specific parameters of the AGF layer

defaults:
  - /model/layers@model.attention_layer: agf
  - override /model/layers/estimator@model.attention_layer.graph_estimator: attention_style
  - override /model/layers/filter@model.attention_layer.graph_filter: polynomial

model:
  _target_: graph_attention.models.simple_vit.SimpleViT
  image_size: 32
  patch_size: 4
  dim: 256
  depth: 6
  heads: 4
  mlp_dim: 512
  dim_head: 64
  
  # Override AGF parameters here
  attention_layer:
    graph_estimator:
      k_neighbors: 16  # Change sparsity
    graph_filter:
      order: 5       # Change polynomial order
