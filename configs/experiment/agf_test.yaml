# @package _global_

defaults:
  - override /model: vit_base
  - override /dataset: cifar10
  - override /optimizer: adamw
  - override /scheduler: onecycle
  - override /model/layers@model.attention_layer: agf
  - override /model/layers/estimator@model.attention_layer.graph_estimator: attention
  - override /model/layers/filter@model.attention_layer.graph_filter: polynomial

optimizer:
  lr: 0.001

model:
  attention_layer:
    graph_estimator:
      k_neighbors: 128
    graph_filter:
      order: 2
      basis: monomial

training:
  epochs: 30
  use_amp: true

attn: ${model.attention_layer}
prefix: ${attn.graph_filter.basis}_o${attn.graph_filter.order}
suffix: ${now:%H-%M-%S}
run: ${prefix}/${now:%Y-%m-%d}/${suffix}