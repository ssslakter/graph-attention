# @package _global_

defaults:
  - override /model: vit_base
  - override /dataset: cifar10
  - override /optimizer: adamw
  - override /scheduler: onecycle
  - override /model/layers@model.attention_layer: agf

optimizer:
  lr: 0.001

model:
  attention_layer:
    top_k: null
    order: 2
    basis: monomial

training:
  epochs: 20
  use_amp: true

attn: ${model.attention_layer}
prefix: positive_alphas_o${attn.order}
suffix: ${now:%Y-%m-%d}/${now:%H-%M-%S}
run: ${prefix}/${suffix}