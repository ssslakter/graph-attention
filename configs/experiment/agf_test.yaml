# @package _global_

defaults:
  - /model/layers@model.attention_layer: agf
  - override /model: vit_tiny
  - override /dataset: cifar10
  - override /optimizer: adamw
  - override /scheduler: onecycle

optimizer:
  lr: 0.001
  weight_decay: 0.05

model:
  attention_layer:
    top_k: null
    order: 2
    basis: monomial
    alphas_act: none

training:
  epochs: 20
  use_amp: true

attn: ${model.attention_layer}
prefix: positive_alphas_o${attn.order}
suffix: ${now:%Y-%m-%d}/${now:%H-%M-%S}
run: ${prefix}/${suffix}