# @package _global_

defaults:
  - /model/layers@model.attention_layer: agf
  - override /model: vit_tiny
  - override /dataset: cifar10
  - override /optimizer: adamw
  - override /scheduler: onecycle

optimizer:
  lr: 1e-3
  weight_decay: 0.1

model:
  attention_layer:
    top_k: null
    order: 1
    basis: monomial
    alphas_act: softmax
    

training:
  epochs: 100
  use_amp: true
  # pretrained_path: "outputs/vit_tiny_cifar10/2026-01-28_23-50-21/checkpoints/checkpoint_step_3000.pt"
  # init_step: 3000 # match checkpoint step to continue lr schedule smoothly
  grad_clip: 1.0


dataloader:
  batch_size: 512
  valid_batch_size: 512
  num_workers: 6


hooks:
  ema:
    decay: 0.999
  
  metrics:
    metrics:
      - _target_: graph_attention.training.metrics.LayerActivationStats
        freq: 500
      - _target_: trainer_tools.hooks.metrics.Loss
      - _target_: graph_attention.training.metrics.AccuracyMixup
      - _target_: trainer_tools.hooks.metrics.LRStats
  checkpoint:
    save_every_steps: 1000
    keep_last: 10


attn: ${model.attention_layer}
prefix: agf_tiny_cifar10_o${attn.order}_act_${attn.alphas_act}
run: ${prefix}/${now:%Y-%m-%d}/${now:%H-%M-%S}
