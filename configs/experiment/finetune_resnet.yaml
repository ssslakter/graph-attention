# @package _global_

defaults:
  - override /model: resnet
  - override /dataset: imagenette
  - override /optimizer: adamw
  - override /scheduler: cosine

model:
  pretrained: resnet18
  attn_layer_indices: [2,3]
  region_size: 16

optimizer:
  lr: 8e-4
  weight_decay: 0.05
  fused: true

torch:
  compile: false
  matmul_precision: high

training:
  seed: 42
  epochs: 30
  use_amp: true
  grad_clip: 1.0

dataset:
  augmentation: standard

dataloader:
  batch_size: 256
  valid_batch_size: 256
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 1

hooks:
  checkpoint:
    enabled: true
    save_every_steps: 5000
  
  ema:
    enabled: false
  
  metrics:
    enabled: true
    verbose: true
    metrics:
      - _target_: trainer_tools.hooks.metrics.Loss
      - _target_: graph_attention.training.metrics.Accuracy
      - _target_: trainer_tools.hooks.metrics.LRStats
    tracker_type: trackio
    project: resnet18-attn

prefix: resnet18
suffix: ${now:%Y-%m-%d_%H-%M-%S}
run: ${prefix}_attn_l3,4/${suffix}
