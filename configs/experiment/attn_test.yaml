# @package _global_

defaults:
  - override /model: vit_base
  - override /dataset: cifar10
  - override /optimizer: adamw
  - override /scheduler: onecycle
  - override /model/layers@model.attention_layer: attention

optimizer:
  lr: 0.001

training:
  epochs: 30
  use_amp: true

prefix: attention
suffix: ${now:%H-%M-%S}
run: ${prefix}/${now:%Y-%m-%d}/${suffix}
